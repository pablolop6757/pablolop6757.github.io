<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Experiencia optimizada para estabilidad en Meta Quest 3.
 * Evita el congelamiento mediante pre-asignación de memoria y eventos de agarre nativos.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    // Pre-asignamos objetos para evitar Garbage Collection masivo en el loop
    this._pos = new THREE.Vector3();
    this._quat = new THREE.Quaternion();
    this._scl = new THREE.Vector3();
    this._m4 = new THREE.Matrix4();
    this._handToObject = new THREE.Matrix4();
    
    this.isGrabbing = false;
    this._activeHand = null;
    this.ball = null;
    
    this.colorNormal = 0x00ffcc;
    this.colorGrab = 0xffff00;
  }

  init() {
    // Luces
    this.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3));
    const direct = new THREE.DirectionalLight(0xffffff, 2);
    direct.position.set(1, 2, 1);
    this.add(direct);

    // Pelota
    const geo = new THREE.SphereGeometry(0.04, 32, 32);
    const mat = new THREE.MeshPhongMaterial({
      color: this.colorNormal,
      shininess: 80,
      transparent: true,
      opacity: 0.9
    });

    this.ball = new THREE.Mesh(geo, mat);
    this.ball.position.set(0, 1.3, -0.5);
    this.add(this.ball);
    
    console.log("Experiencia estable iniciada.");
  }

  /**
   * onObjectGrabStart: Específico de XR Blocks para iniciar manipulación.
   */
  onObjectGrabStart(event) {
    if (this.isGrabbing) return;

    // Solo agarramos si hay intersección con nuestra pelota
    const intersections = xb.core.input.intersectObjectByController(event.target, this.ball);
    if (intersections.length === 0) return;

    this.isGrabbing = true;
    this._activeHand = event.target;
    this.ball.material.color.setHex(this.colorGrab);

    // Calcular offset inicial una sola vez
    this.ball.updateMatrixWorld(true);
    this._activeHand.updateMatrixWorld(true);
    
    const handInv = this._m4.copy(this._activeHand.matrixWorld).invert();
    this._handToObject.copy(handInv).multiply(this.ball.matrixWorld);
  }

  /**
   * onObjectGrabbing: Bucle optimizado sin creación de nuevos objetos.
   */
  onObjectGrabbing(event) {
    if (!this.isGrabbing || event.target !== this._activeHand) return;

    // Actualizamos posición usando las variables pre-asignadas del constructor
    this._activeHand.updateMatrixWorld(true);
    const worldM = this._m4.multiplyMatrices(this._activeHand.matrixWorld, this._handToObject);
    
    worldM.decompose(this._pos, this._quat, this._scl);

    this.ball.position.copy(this._pos);
    this.ball.quaternion.copy(this._quat);
  }

  /**
   * onObjectGrabEnd: Limpieza total de referencias.
   */
  onObjectGrabEnd(event) {
    if (this.isGrabbing && event.target === this._activeHand) {
      this.resetState();
    }
  }

  // Fallback para controladores o simulador de escritorio
  onSelectStart(event) { this.onObjectGrabStart(event); }
  onSelecting(event) { this.onObjectGrabbing(event); }
  onSelectEnd(event) { this.onObjectGrabEnd(event); }

  resetState() {
    this.isGrabbing = false;
    this._activeHand = null;
    if (this.ball) this.ball.material.color.setHex(this.colorNormal);
  }
}

document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  options.enableHands();
  options.enableReticles();
  
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Estabilidad Quest 3');

  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (err) {
    console.error("Error XR:", err);
  }
});
    </script>
  </body>
</html>
