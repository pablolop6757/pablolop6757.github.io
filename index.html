<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Versión "Safe Mode" para Meta Quest 3.
 * Evita bloqueos eliminando cálculos de física/luces pesados y usando seguimiento por lerp.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    this.ball = null;
    this.activeController = null;
    this.isGrabbing = false;
    
    // Colores pre-definidos
    this.colorNormal = new THREE.Color(0x00ffcc);
    this.colorGrab = new THREE.Color(0xffff00);
    
    // Offset para que la pelota no tape el centro de la mano
    this.offset = new THREE.Vector3(0, 0, -0.05);
  }

  init() {
    // Iluminación muy básica (solo para la escena, la pelota usará material básico)
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

    // Pelota de bajo poligonaje y material básico (sin sombras/luces) para evitar crashes
    const geometry = new THREE.SphereGeometry(0.04, 12, 12);
    const material = new THREE.MeshBasicMaterial({
      color: this.colorNormal,
      transparent: true,
      opacity: 0.8
    });

    this.ball = new THREE.Mesh(geometry, material);
    this.ball.position.set(0, 1.3, -0.5);
    this.add(this.ball);
    
    console.log("Modo seguro activado. Intenta mover la pelota.");
  }

  /**
   * Identificamos el controlador que intenta agarrar.
   */
  onSelectStart(event) {
    if (this.isGrabbing) return;

    const controller = event.target;
    if (!controller) return;

    // Solo comprobamos intersección en el momento inicial del click/pinch
    const intersections = xb.core.input.intersectObjectByController(controller, this.ball);
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this.activeController = controller;
      this.ball.material.color.copy(this.colorGrab);
    }
  }

  /**
   * Liberamos el estado.
   */
  onSelectEnd(event) {
    if (this.isGrabbing && event.target === this.activeController) {
      this.isGrabbing = false;
      this.activeController = null;
      this.ball.material.color.copy(this.colorNormal);
    }
  }

  /**
   * La lógica de movimiento ocurre aquí, de forma suave y controlada por el motor.
   */
  update() {
    if (this.isGrabbing && this.activeController) {
      // Usamos LERP (Linear Interpolation) para seguir la posición de la mano.
      // Esto es mucho más estable que el parenting directo en Quest 3.
      // 0.2 es el factor de suavizado.
      this.ball.position.lerp(this.activeController.position, 0.2);
      
      // La rotación también se suaviza
      this.ball.quaternion.slerp(this.activeController.quaternion, 0.1);
    }

    // Seguridad: si el controlador deja de ser visible (se pierde el tracking), soltamos.
    if (this.isGrabbing && this.activeController && !this.activeController.visible) {
      this.isGrabbing = false;
      this.activeController = null;
      this.ball.material.color.copy(this.colorNormal);
    }
  }
}

// Configuración de entrada
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  options.enableHands();
  
  // Desactivamos retículas si persisten los crashes, ya que el raycasting constante puede saturar.
  options.enableReticles(); 
  
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Stable Interaction Quest 3');

  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (err) {
    console.error("Fallo al iniciar:", err);
  }
});
    </script>
  </body>
</html>
