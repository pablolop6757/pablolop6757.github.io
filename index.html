<!doctype html>
<html lang="es">
  <head>
    <title>Simulador de Panel Eléctrico | Meta Quest 3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * Experiencia principal del panel eléctrico con el modelo físico subido.
       * Permite al usuario interactuar con controles espaciales en WebXR
       * que alteran el comportamiento del modelo TSK_Box2.
       */
      class ElectricalPanelApp extends xb.Script {
        constructor() {
          super();
          // Variables de estado del sistema
          this.powerOn = true;
          this.voltage = 220;
          this.emergency = false;
          this.time = 0;
          this.breakers = [];
        }

        async init() {
          this.setupEnvironment();
          await this.loadUploadedModel();
          this.createControlPanel();
          this.updateSystemState();
        }

        /**
         * Configura las luces base del entorno.
         */
        setupEnvironment() {
          this.ambientLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
          this.add(this.ambientLight);

          this.mainLight = new THREE.PointLight(0xffffff, 2.0, 10);
          this.mainLight.position.set(0, 2, -1.5);
          this.add(this.mainLight);
        }

        /**
         * Carga el modelo 3D proporcionado por el usuario usando xb.ModelViewer
         */
        async loadUploadedModel() {
          this.modelViewer = new xb.ModelViewer({});
          this.add(this.modelViewer);
          
          try {
            await this.modelViewer.loadGLTFModel({
              data: {
                scale: {x: 1.0, y: 1.0, z: 1.0}, // Escala por defecto
                path: '', // Directorio actual
                model: 'TSK_Box2.glb',
              },
              setupPlatform: false,
              renderer: xb.core.renderer,
            });
            
            // Posicionamos el modelo a la derecha del panel
            this.modelViewer.position.set(0.8, xb.core.user.height - 0.2, -xb.core.user.panelDistance);
            
          } catch(e) {
            console.error("Error al cargar TSK_Box2.glb:", e);
          }
        }

        /**
         * Construye la Interfaz UI Espacial.
         */
        createControlPanel() {
          // Panel base oscuro
          this.panel = new xb.SpatialPanel({
            width: 1.2,
            height: 1.3,
            backgroundColor: '#2b2b2baa'
          });
          this.panel.position.set(-0.4, xb.core.user.height, -xb.core.user.panelDistance);
          this.add(this.panel);

          const grid = this.panel.addGrid();

          // FILA 1: Título
          grid.addRow({weight: 0.15}).addText({
            text: 'PANEL ELÉCTRICO PRINCIPAL',
            fontColor: '#fbbc05',
            fontSize: 0.07
          });

          // FILA 2: Energía Principal
          const powerRow = grid.addRow({weight: 0.2});
          powerRow.addCol({weight: 0.7}).addText({
            text: 'ENERGÍA DEL SISTEMA',
            anchorX: 'left',
            fontSize: 0.06
          });
          this.btnPower = powerRow.addCol({weight: 0.3}).addIconButton({
            text: 'power_settings_new',
            fontSize: 0.4
          });
          this.btnPower.onTriggered = () => this.togglePower();

          // FILA 3: Control de Voltaje
          const voltRow = grid.addRow({weight: 0.2});
          voltRow.addCol({weight: 0.4}).addText({
            text: 'VOLTAJE',
            anchorX: 'left',
            fontSize: 0.06
          });
          const voltControls = voltRow.addCol({weight: 0.6});
          
          voltControls.addCol({weight: 0.3}).addIconButton({text: 'remove', fontSize: 0.3})
            .onTriggered = () => this.adjustVoltage(-10);
            
          this.txtVolt = voltControls.addCol({weight: 0.4}).addText({
            text: `${this.voltage} V`,
            fontSize: 0.07,
            fontColor: '#4285f4'
          });
          
          voltControls.addCol({weight: 0.3}).addIconButton({text: 'add', fontSize: 0.3})
            .onTriggered = () => this.adjustVoltage(10);

          // FILA 4: Interruptores de Circuitos (Breakers)
          const breakersRow = grid.addRow({weight: 0.25});
          for (let i = 0; i < 4; i++) {
            const bCol = breakersRow.addCol({weight: 0.25});
            bCol.addRow({weight: 0.3}).addText({text: `C-${i+1}`, fontSize: 0.04});
            
            const btn = bCol.addRow({weight: 0.7}).addIconButton({
              text: 'toggle_on',
              fontSize: 0.4
            });
            
            const breakerData = { state: true, btn: btn };
            btn.onTriggered = () => this.toggleBreaker(breakerData);
            this.breakers.push(breakerData);
          }

          // FILA 5: Parada de Emergencia
          const stopRow = grid.addRow({weight: 0.2});
          this.btnEmergency = stopRow.addTextButton({
            text: 'PARADA DE EMERGENCIA',
            backgroundColor: '#ea4335',
            fontColor: '#ffffff',
            fontSize: 0.06
          });
          this.btnEmergency.onTriggered = () => this.toggleEmergency();

          this.panel.updateLayouts();
        }

        // Lógicas de los botones

        togglePower() {
          if (this.emergency) return;
          this.powerOn = !this.powerOn;
          this.updateSystemState();
        }

        adjustVoltage(delta) {
          if (!this.powerOn || this.emergency) return;
          this.voltage += delta;
          if (this.voltage < 0) this.voltage = 0;
          if (this.voltage > 400) this.voltage = 400;
          this.txtVolt.setText(`${this.voltage} V`);
        }

        toggleBreaker(breakerData) {
          if (this.emergency || !this.powerOn) return;
          breakerData.state = !breakerData.state;
          breakerData.btn.setText(breakerData.state ? 'toggle_on' : 'toggle_off');
        }

        toggleEmergency() {
          this.emergency = !this.emergency;
          if (this.emergency) {
            // Activar emergencia
            this.powerOn = false;
            this.btnEmergency.setText('REARMAR SISTEMA');
            this.btnEmergency.backgroundColor = '#fbbc05'; // Naranja/Amarillo
          } else {
            // Desactivar emergencia
            this.btnEmergency.setText('PARADA DE EMERGENCIA');
            this.btnEmergency.backgroundColor = '#ea4335'; // Rojo
          }
          this.updateSystemState();
        }

        /**
         * Actualiza los elementos visuales de acuerdo al estado general.
         */
        updateSystemState() {
          // Icono de Power principal
          this.btnPower.setText(this.powerOn ? 'power_settings_new' : 'power_off');

          // Luces normales
          if (!this.emergency) {
            this.mainLight.color.setHex(0xffffff);
            this.ambientLight.intensity = this.powerOn ? 0.8 : 0.2;
            this.mainLight.intensity = this.powerOn ? 2.0 : 0.0;
          }

          // Actualizar texto del voltaje si se cortó la energía
          if (!this.powerOn) {
            this.txtVolt.setText(`0 V`);
          } else {
            this.txtVolt.setText(`${this.voltage} V`);
          }
        }

        /**
         * El bucle de actualización constante (manejado por requestAnimationFrame interno).
         */
        update() {
          const dt = xb.getDeltaTime();
          this.time += dt;

          // Animación de emergencia (Luz roja intermitente)
          if (this.emergency) {
            this.mainLight.color.setHex(0xff0000);
            this.ambientLight.intensity = 0.1;
            // Intermitencia
            this.mainLight.intensity = Math.sin(this.time * 8) > 0 ? 3.0 : 0.0;
          } else if (!this.powerOn) {
            // Mantener estado apagado
          } else {
            this.mainLight.color.setHex(0xffffff);
            
            // Animamos la rotación del modelo si todo está encendido
            if (this.modelViewer) {
              // Calculamos cuántos breakers están encendidos
              const activeBreakers = this.breakers.filter(b => b.state).length;
              // La velocidad de rotación depende del voltaje y los breakers
              const targetSpeed = (this.voltage / 220.0) * (activeBreakers / 4.0) * 2.0;
              
              this.modelViewer.rotation.y += targetSpeed * dt;
            }
          }
        }
      }

      // Inicialización de la escena
      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        
        // Habilitamos controles de UI y visualización de manos
        options.enableUI();
        options.enableHands();
        
        options.hands.enabled = true;
        options.hands.visualization = true;

        xb.add(new ElectricalPanelApp());
        xb.init(options);
      });
    </script>
  </body>
</html>
