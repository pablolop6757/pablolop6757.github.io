<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Experiencia interactiva para Meta Quest 3 / Android XR.
 * Permite agarrar y desplazar una pelota en el espacio real.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    this.isGrabbing = false;
    this._activeHand = null;
    this._handToObject = new THREE.Matrix4();
    this.ball = null;
    this.originalColor = 0x00ffcc;
    this.grabColor = 0xffff00;
  }

  init() {
    // Iluminación
    this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(1, 2, 1);
    this.add(sun);

    // Crear la pelota (tamaño de pelota de tenis)
    const geometry = new THREE.SphereGeometry(0.04, 32, 32);
    const material = new THREE.MeshPhongMaterial({
      color: this.originalColor,
      shininess: 80,
      transparent: true,
      opacity: 0.9
    });

    this.ball = new THREE.Mesh(geometry, material);
    // Posición inicial: frente al usuario a la altura de la vista
    this.ball.position.set(0, 1.4, -0.6);
    this.add(this.ball);
    
    console.log("Interactúa con la pelota usando el gesto de pinza o el gatillo.");
  }

  /**
   * Se dispara cuando el usuario inicia un "select" (pinch o click) sobre un objeto.
   */
  onObjectGrabStart(event) {
    if (this.isGrabbing) return;

    // Verificar si el controlador/mano está tocando la pelota
    const intersections = xb.core.input.intersectObjectByController(event.target, this.ball);
    if (intersections.length === 0) return;

    this.isGrabbing = true;
    this._activeHand = event.target;
    this.ball.material.color.setHex(this.grabColor);

    // Calcular la relación espacial entre la mano y la pelota para un movimiento suave
    this.ball.updateMatrixWorld(true);
    this._activeHand.updateMatrixWorld(true);

    const handMatrixInverse = new THREE.Matrix4().copy(this._activeHand.matrixWorld).invert();
    this._handToObject.copy(handMatrixInverse).multiply(this.ball.matrixWorld);
  }

  /**
   * Se dispara continuamente mientras el usuario mantiene el agarre.
   */
  onObjectGrabbing(event) {
    if (!this.isGrabbing || event.target !== this._activeHand) return;

    this._activeHand.updateMatrixWorld(true);
    
    // Aplicar la transformación de la mano a la pelota manteniendo el desfase inicial
    const newWorldMatrix = new THREE.Matrix4().multiplyMatrices(this._activeHand.matrixWorld, this._handToObject);
    
    const pos = new THREE.Vector3();
    const quat = new THREE.Quaternion();
    const scale = new THREE.Vector3();
    
    newWorldMatrix.decompose(pos, quat, scale);

    this.ball.position.copy(pos);
    this.ball.quaternion.copy(quat);
  }

  /**
   * Se dispara cuando el usuario suelta la pelota.
   */
  onObjectGrabEnd(event) {
    if (this.isGrabbing && event.target === this._activeHand) {
      this.isGrabbing = false;
      this._activeHand = null;
      this.ball.material.color.setHex(this.originalColor);
    }
  }

  // Soporte para el simulador de escritorio (clicks de ratón)
  onSelectStart(event) { this.onObjectGrabStart(event); }
  onSelecting(event) { this.onObjectGrabbing(event); }
  onSelectEnd(event) { this.onObjectGrabEnd(event); }
}

// Configuración de arranque
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  options.enableHands();
  options.enableReticles();
  
  // Visualización de manos para Quest 3
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Mover Pelota XR');

  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (err) {
    console.error("Fallo al iniciar XR:", err);
  }
});
    </script>
  </body>
</html>
