<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Optimizada XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Versión Mejorada y Optimizada para Meta Quest 3.
 * Usa eventos nativos de Hitbox pero con cero creación de basura en memoria para evitar bloqueos.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    this.isGrabbing = false;
    this.activeController = null; // Añadido para gestionar el controlador activo

    // --- OPTIMIZACIÓN CRÍTICA ---
    // Pre-asignamos todas las variables que se usan repetitivamente en el bucle
    this._handToObject = new THREE.Matrix4();
    this._mH = new THREE.Matrix4();
    this._mO = new THREE.Matrix4();
    this._mParentInv = new THREE.Matrix4();
    this._mOlocal = new THREE.Matrix4();
    this._pos = new THREE.Vector3();
    this._quat = new THREE.Quaternion();
    this._scl = new THREE.Vector3();
    
    this.originalColor = new THREE.Color(0x00ffcc);
  }

  init() {
    // Iluminación
    this.add(new THREE.HemisphereLight(0xbbbbbb, 0x888888, 3));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(1, 1, 1).normalize();
    this.add(light);

    // Pelota
    const geometry = new THREE.SphereGeometry(0.06, 32, 32);
    // Usamos StandardMaterial que reacciona un poco mejor a la luz que Phong
    const material = new THREE.MeshStandardMaterial({
      color: this.originalColor,
      roughness: 0.2,
      metalness: 0.1
    });
    this.target = new THREE.Mesh(geometry, material);
    
    // Posicionar frente al usuario
    this.target.position.set(0, 1.2, -0.4);
    this.add(this.target);
    
    console.log("Acerca tu mano a la pelota y cierra el puño para agarrarla.");
  }

  // --- HITBOX: Reacción al toque ---
  onObjectTouchStart(event) {
    this.target.material.color.setHex(0xffff00); // Amarillo cuando tu mano la atraviesa
  }

  onObjectTouchEnd(event) {
    if (!this.isGrabbing) {
      this.target.material.color.copy(this.originalColor); // Vuelve al turquesa original
    }
  }

  // --- AGARRE: Usar puño cerrado (Squeeze) en lugar de pinza ---
  onSqueezeStart(event) {
    if (this.isGrabbing) return;
    
    const controller = event.target;
    const intersections = xb.core.input.intersectObjectByController(controller, this.target);
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this.activeController = controller;
      this.target.material.color.setHex(0xff0000); // Rojo mientras la sujetas con el puño

      // Guardar la transformación delta inicial usando las matrices pre-asignadas
      this.target.updateMatrixWorld(true);
      controller.updateMatrixWorld(true);

      const H0 = this._mH.copy(controller.matrixWorld);
      const O0 = this._mO.copy(this.target.matrixWorld);
      this._handToObject.copy(H0).invert().multiply(O0);
    }
  }

  /**
   * Mover el objeto de forma estable
   */
  onSqueezing(event) {
    if (!this.isGrabbing || event.target !== this.activeController) return;

    const controller = this.activeController;
    controller.updateMatrixWorld(true);
    
    this._mH.copy(controller.matrixWorld);
    this._mO.multiplyMatrices(this._mH, this._handToObject);
    
    const parent = this.target.parent;
    if (parent) parent.updateMatrixWorld(true);
    
    if (parent) {
      this._mParentInv.copy(parent.matrixWorld).invert();
    } else {
      this._mParentInv.identity();
    }

    this._mOlocal.multiplyMatrices(this._mParentInv, this._mO);
    this._mOlocal.decompose(this._pos, this._quat, this._scl);

    this.target.position.copy(this._pos);
    this.target.quaternion.copy(this._quat);
    this.target.updateMatrix();
  }

  onSqueezeEnd(event) {
    if (this.isGrabbing && event.target === this.activeController) {
      this.isGrabbing = false;
      this.activeController = null;
      this.target.material.color.copy(this.originalColor);
    }
  }
}

// Configuración de entrada
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  options.enableHands();
  
  // Habilitamos opciones de manos avanzadas
  options.hands.enabled = true;
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Hitbox Mejorada');

  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (err) {
    console.error("Fallo al iniciar:", err);
  }
});
</script>
  </body>
</html>
