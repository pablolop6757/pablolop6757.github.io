<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Experiencia interactiva para Meta Quest 3.
 * Crea una pelota que puedes ver en Passthrough y manipular con las manos.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    this.isGrabbing = false;
    this._handToObject = null;
    this.ball = null;
  }

  init() {
    // 1. Iluminación para que los objetos se vean integrados
    const ambientLight = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
    this.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(1, 2, 1);
    this.add(directionalLight);

    // 2. Crear la pelota (tamaño similar a una pelota de tenis: ~6.5cm de diámetro)
    const radius = 0.035; 
    const geometry = new THREE.SphereGeometry(radius, 32, 32);
    const material = new THREE.MeshPhongMaterial({
      color: 0x00ffcc, // Color turquesa brillante
      shininess: 100,
      transparent: true,
      opacity: 0.9
    });

    this.ball = new THREE.Mesh(geometry, material);
    
    // Posicionar la pelota frente al usuario (aproximadamente a la altura del pecho)
    this.ball.position.set(0, 1.2, -0.5);
    
    this.add(this.ball);
    
    console.log("Experiencia iniciada. Busca la pelota turquesa.");
  }

  // --- Lógica de Agarre (Grabbing) ---

  onObjectGrabStart(event) {
    if (this.isGrabbing) return;
    
    // Verificar si estamos interactuando con la pelota
    const intersection = xb.core.input.intersectObjectByController(event.target, this.ball);
    if (intersection.length === 0) return;

    this.isGrabbing = true;
    this.ball.material.color.setHex(0xffff00); // Cambia a amarillo al agarrar

    // Calcular la matriz de compensación entre la mano y el objeto
    this.ball.updateMatrixWorld(true);
    event.hand.updateMatrixWorld(true);

    const handMatrixInverse = new THREE.Matrix4().copy(event.hand.matrixWorld).invert();
    this._handToObject = new THREE.Matrix4().multiplyMatrices(handMatrixInverse, this.ball.matrixWorld);
  }

  onObjectGrabbing(event) {
    if (!this.isGrabbing || !this._handToObject) return;

    // Actualizar la posición de la pelota para que siga a la mano
    event.hand.updateMatrixWorld(true);
    const newWorldMatrix = new THREE.Matrix4().multiplyMatrices(event.hand.matrixWorld, this._handToObject);
    
    // Descomponer la matriz para aplicar posición y rotación
    const pos = new THREE.Vector3();
    const quat = new THREE.Quaternion();
    const scale = new THREE.Vector3();
    newWorldMatrix.decompose(pos, quat, scale);

    this.ball.position.copy(pos);
    this.ball.quaternion.copy(quat);
  }

  onObjectGrabEnd(event) {
    if (!this.isGrabbing) return;
    
    this.isGrabbing = false;
    this._handToObject = null;
    this.ball.material.color.setHex(0x00ffcc); // Vuelve a su color original
  }
}

// Configuración de inicio
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  // Habilitar manos y retículas para Quest 3
  options.enableHands();
  options.enableReticles();
  
  // Configuración visual de las manos
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;

  // Título de la app
  options.setAppTitle('Passthrough Ball Quest 3');

  // Inicializar el SDK y añadir nuestro script
  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (e) {
    console.error("Error al inicializar WebXR:", e);
  }
});
    </script>
  </body>
</html>
