<!doctype html>
<html lang="es">
  <head>
    <title>Mantenimiento Panel Eléctrico | XR Blocks</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Aplicación de mantenimiento guiado para un panel eléctrico.
 * Muestra instrucciones espaciales, carga un modelo GLB y resalta
 * zonas que el usuario debe tocar (con los mandos o manos) para avanzar.
 */
class MaintenanceApp extends xb.Script {
  
  constructor() {
    super();
    this.currentStepIndex = 0;
    this.marker = null;
    this.panelModel = null;
    this.isWaitingForInteraction = false;
    
    // Configuración de los pasos del tutorial.
    // NOTA: Ajusta las coordenadas 'markerPos' (x, y, z) para que el marcador
    // rojo aparezca exactamente sobre los disyuntores de tu modelo 3D.
    this.steps = [
      {
        title: "Inicio del Mantenimiento",
        text: "Bienvenido. Te guiaremos paso a paso en el mantenimiento del panel TSK.\n\nPulsa el botón 'Empezar' para iniciar.",
        markerPos: null
      },
      {
        title: "Paso 1: Desenergizar",
        text: "Baja el plomo (disyuntor central) para desenergizar todo el panel por seguridad.\n\nToca la zona resaltada en rojo en el panel 3D para confirmar.",
        // Ahora las coordenadas son METROS globales: x=0 (centro), y=1.5 (altura de ojos), z=-1.0 (frente a ti)
        markerPos: new THREE.Vector3(0, 1.5, -1.0) 
      },
      {
        title: "Paso 2: Disyuntores Secundarios",
        text: "Baja y luego sube cada uno de los disyuntores secundarios para comprobar su estado mecánico.\n\nToca la nueva zona resaltada cuando termines.",
        markerPos: new THREE.Vector3(0.2, 1.4, -1.0) 
      },
      {
        title: "Paso 3: Re-energizar",
        text: "Vuelve a activar el disyuntor central para restablecer la energía del sistema.\n\nToca el disyuntor principal de nuevo.",
        markerPos: new THREE.Vector3(0, 1.5, -1.0) 
      },
      {
        title: "Mantenimiento Completado",
        text: "¡Excelente! Has completado el mantenimiento preventivo del panel TSK.\n\nPuedes reiniciar el proceso si lo deseas.",
        markerPos: null
      }
    ];
  }

  async init() {
    // 1. Añadir iluminación
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(2, 5, 3);
    this.add(dirLight);

    // 2. Crear panel UI de instrucciones (Izquierda)
    this.createInstructionPanel();

    // 3. Crear panel UI con el Esquema (Derecha)
    this.createSchemaPanel();

    // 4. Cargar el modelo 3D del Panel (Centro)
    await this.loadElectricalPanel();

    // 5. Crear el marcador 3D (Zonas interactivas)
    this.createInteractionMarker();

    // Inicializar el primer paso
    this.updateStepUI();
  }

  createInstructionPanel() {
    this.uiPanel = new xb.SpatialPanel({
      width: 1.0,
      height: 0.8,
      backgroundColor: '#1e1e1edd'
    });
    // Posicionamos el panel a la izquierda
    this.uiPanel.position.set(-0.8, xb.core.user.height, -1.2);
    this.uiPanel.rotation.set(0, Math.PI / 6, 0); // Girado ligeramente hacia el usuario
    this.add(this.uiPanel);

    const grid = this.uiPanel.addGrid();
    
    this.titleText = grid.addRow({weight: 0.2}).addText({
      text: 'Cargando...',
      fontColor: '#4CAF50',
      fontSize: 0.08
    });
    
    this.descText = grid.addRow({weight: 0.6}).addText({
      text: 'Por favor espera...',
      fontColor: '#ffffff',
      fontSize: 0.05
    });

    const btnRow = grid.addRow({weight: 0.2});
    btnRow.addCol({weight: 0.2}); // Espaciador
    this.actionBtn = btnRow.addCol({weight: 0.6}).addTextButton({
      text: 'Empezar',
      backgroundColor: '#4CAF50',
      fontSize: 0.06
    });
    btnRow.addCol({weight: 0.2}); // Espaciador

    // Lógica del botón de la UI
    this.actionBtn.onTriggered = () => {
      if (!this.isWaitingForInteraction) {
        this.nextStep();
      }
    };
  }

  createSchemaPanel() {
    this.schemaPanel = new xb.SpatialPanel({
      width: 1.0,
      height: 1.0,
      backgroundColor: '#ffffff'
    });
    // Posicionamos el esquema a la derecha
    this.schemaPanel.position.set(0.8, xb.core.user.height, -1.2);
    this.schemaPanel.rotation.set(0, -Math.PI / 6, 0);
    this.add(this.schemaPanel);

    const grid = this.schemaPanel.addGrid();
    grid.addRow({weight: 0.1}).addText({
      text: 'Esquema de Referencia',
      fontColor: '#333333',
      fontSize: 0.06
    });
    
    // Carga la imagen subida
    grid.addRow({weight: 0.9}).addImage({
      src: 'esquema1.jpg' 
    });
  }

  async loadElectricalPanel() {
    try {
      const loader = new xb.ModelLoader();
      const gltf = await loader.load({
        url: 'TSK_Box2.glb',
        renderer: xb.core.renderer
      });
      
      this.panelModel = gltf.scene;
      
      // --- AUTO ESCALADO Y CENTRADO ---
      // Calculamos la caja delimitadora (Bounding Box) del modelo
      const box = new THREE.Box3().setFromObject(this.panelModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // Buscamos la dimensión más grande y forzamos a que mida 1 metro
      const maxDim = Math.max(size.x, size.y, size.z);
      const targetSize = 1.0; 
      const scale = maxDim > 0 ? targetSize / maxDim : 1;
      
      this.panelModel.scale.set(scale, scale, scale);

      // Centramos el modelo (restando su centro escalado) y lo colocamos frente a la cámara
      this.panelModel.position.set(
        -center.x * scale,
        (-center.y * scale) + xb.core.user.height - 0.2, 
        (-center.z * scale) - 1.2
      );
      
      this.add(this.panelModel);
    } catch (error) {
      console.error("Error al cargar el modelo 3D:", error);
      this.titleText.setText("Error");
      this.descText.setText("No se pudo cargar TSK_Box2.glb. Verifica el archivo.");
    }
  }

  createInteractionMarker() {
    // Un marcador esférico, rojo y semi-transparente
    const geometry = new THREE.SphereGeometry(0.06, 16, 16);
    const material = new THREE.MeshBasicMaterial({
      color: 0xff3333,
      transparent: true,
      opacity: 0.7,
      wireframe: true
    });
    this.marker = new THREE.Mesh(geometry, material);
    this.marker.visible = false;
    
    // Lo añadimos directamente a la escena global para que su tamaño
    // y posición (en metros) no se vean afectados por el escalado del modelo.
    this.add(this.marker);
  }

  updateStepUI() {
    const step = this.steps[this.currentStepIndex];
    
    this.titleText.setText(step.title);
    this.descText.setText(step.text);

    if (step.markerPos) {
      // El paso requiere tocar el modelo 3D
      this.isWaitingForInteraction = true;
      this.marker.position.copy(step.markerPos);
      this.marker.visible = true;
      
      // Actualizamos el botón para indicar la acción manual
      this.actionBtn.setText('Toca el marcador 3D...');
      this.actionBtn.options.backgroundColor = '#888888'; 
    } else {
      // El paso requiere pulsar el botón de la UI
      this.isWaitingForInteraction = false;
      this.marker.visible = false;
      
      this.actionBtn.setText(this.currentStepIndex === 0 ? 'Empezar' : 'Reiniciar');
      this.actionBtn.options.backgroundColor = '#4CAF50';
    }
    
    // Refrescar layouts de la UI
    this.uiPanel.updateLayouts();
  }

  nextStep() {
    this.currentStepIndex++;
    if (this.currentStepIndex >= this.steps.length) {
      this.currentStepIndex = 0; // Reiniciar
    }
    this.updateStepUI();
  }

  /**
   * Se ejecuta cuando el usuario interacciona con el mando (gatillo/pinch)
   * o toca directamente con las manos gracias al Raycast de XR Blocks.
   */
  onSelectStart(event) {
    if (!this.isWaitingForInteraction || !this.marker.visible) return;

    // Comprobamos si el rayo/mano interseca con nuestro marcador rojo
    const controller = event.target;
    const intersection = xb.core.user.select(this.marker, controller);
    
    if (intersection) {
      // Efecto visual de éxito breve
      this.marker.material.color.setHex(0x4CAF50); // Verde
      setTimeout(() => {
        this.marker.material.color.setHex(0xff3333); // Vuelve a rojo
        this.nextStep();
      }, 300);
    }
  }

  update() {
    super.update();
    
    // Animación de pulso continuo para el marcador 3D
    if (this.marker && this.marker.visible) {
      const scale = 1.0 + Math.sin(performance.now() * 0.005) * 0.2;
      this.marker.scale.setScalar(scale);
      this.marker.rotation.y += 0.02;
    }
  }
}

document.addEventListener('DOMContentLoaded', function () {
  const options = new xb.Options();
  options.enableUI();
  options.enableHands(); // Habilitar interacción con manos libres (Quest 3)
  options.reticles.enabled = true;
  options.setAppTitle('Mantenimiento TSK');

  xb.add(new MaintenanceApp());
  xb.init(options);
});
    </script>
  </body>
</html>
