<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR Final | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "cannon": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';
import * as CANNON from 'cannon';

/**
 * Pelota con física completa - rebota, rueda y se lanza.
 */
class BallPhysicsExperience extends xb.Script {
  constructor() {
    super();
    this.ball = null;
    this.ballBody = null;
    this.activeController = null;
    this.isGrabbing = false;
    this.lastControllerPos = new THREE.Vector3();
    this.controllerVelocity = new THREE.Vector3();
    
    // Colores
    this.colorNormal = new THREE.Color(0x00ffcc);
    this.colorGrab = new THREE.Color(0xffff00);
    
    // Offset relativo
    this.localOffset = new THREE.Vector3();
    
    // Física
    this.world = null;
    this.ballRadius = 0.12;
  }

  init() {
    // ==================== FÍSICAS ====================
    this.setupPhysics();
    
    // ==================== LUCES ====================
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(1, 2, 1);
    this.add(dirLight);

    // ==================== PELOTA ====================
    const geometry = new THREE.SphereGeometry(this.ballRadius, 32, 32);
    const material = new THREE.MeshPhongMaterial({
      color: this.colorNormal,
      transparent: true,
      opacity: 0.9,
      shininess: 60
    });

    this.ball = new THREE.Mesh(geometry, material);
    this.ball.position.set(0, 1.3, -0.6);
    this.add(this.ball);

    // Crear cuerpo físico para la pelota
    const ballShape = new CANNON.Sphere(this.ballRadius);
    this.ballBody = new CANNON.Body({
      mass: 0.2,
      shape: ballShape,
      linearDamping: 0.3, // MÁS damping = se frena más rápido
      angularDamping: 0.3,
      restitution: 0.8, // Menos rebote
      friction: 0.6 // MÁS fricción
    });
    this.ballBody.position.set(this.ball.position.x, this.ball.position.y, this.ball.position.z);
    this.world.addBody(this.ballBody);
    
    console.log("🎾 ¡REBOTE MÁXIMO! Lanza la pelota fuerte");
    this.createResetPanel();
  }

  setupPhysics() {
    // Crear mundo de física
    this.world = new CANNON.World();
    this.world.gravity.set(0, -9.82, 0); // Gravedad
    this.world.defaultContactMaterial.friction = 0.6; // MÁS fricción
    this.world.defaultContactMaterial.restitution = 0.7; // Menos rebote global

    // ==================== DETECTAR SUELO REAL DE META QUEST ====================
    let floorY = 0;
    let boundsWidth = 10;
    let boundsDepth = 10;
    
    try {
      const session = xb.core.renderer.xr.getSession();
      if (session && session.inputSources) {
        console.log("✅ Sesión WebXR activa.");
      }
      boundsWidth = 2;
      boundsDepth = 2;
      floorY = 0;
    } catch (e) {
      console.warn("Usando valores por defecto");
    }

    this.initialBallPos = new THREE.Vector3(0, 1.3, -0.6);
    this.boundsWidth = boundsWidth;
    this.boundsDepth = boundsDepth;

    // ==================== SUELO CON COLISIONES ====================
    const groundShape = new CANNON.Plane();
    const groundBody = new CANNON.Body({
      mass: 0,
      shape: groundShape,
      friction: 0.8, // MÁS fricción con suelo
      restitution: 0.6 // Menos rebote en suelo
    });
    groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
    groundBody.position.y = floorY;
    this.world.addBody(groundBody);

    console.log(`🌍 Suelo físico creado en y=${floorY}, tamaño ${boundsWidth}x${boundsDepth}`);

    // Visualizar el suelo con grid
    const groundGeo = new THREE.PlaneGeometry(boundsWidth * 1.5, boundsDepth * 1.5);
    const groundMat = new THREE.MeshStandardMaterial({ 
      color: 0x1a1a1a, 
      metalness: 0.2,
      roughness: 0.8
    });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.y = floorY - 0.001;
    groundMesh.receiveShadow = true;
    this.add(groundMesh);

    // Grid visual
    const gridHelper = new THREE.GridHelper(boundsWidth * 1.5, 8, 0x00ff00, 0x00aa00);
    gridHelper.position.y = floorY + 0.01;
    this.add(gridHelper);

    // ==================== LÍMITES VISUALES ====================
    this.createBounds(-boundsWidth / 2, floorY, 1, boundsWidth, 2.5, 0.1);
    this.createBounds(boundsWidth / 2, floorY, 1, boundsWidth, 2.5, 0.1);
    this.createBounds(0, floorY, -boundsDepth / 2, 0.1, 2.5, boundsDepth);
    this.createBounds(0, floorY, boundsDepth / 2, 0.1, 2.5, boundsDepth);
  }

  createBounds(x, y, z, width, height, depth) {
    const wallShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
    const wallBody = new CANNON.Body({ mass: 0, shape: wallShape, restitution: 0.9 });
    wallBody.position.set(x, y + height / 2, z);
    this.world.addBody(wallBody);
  }

  createWall(x, y, z, width, height, depth) {
    // Cuerpo físico
    const wallShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
    const wallBody = new CANNON.Body({ mass: 0, shape: wallShape });
    wallBody.position.set(x, y, z);
    this.world.addBody(wallBody);

    // Visualización (opcional)
    const wallGeo = new THREE.BoxGeometry(width, height, depth);
    const wallMat = new THREE.MeshStandardMaterial({ 
      color: 0x666666, 
      metalness: 0.2,
      roughness: 0.8,
      transparent: true,
      opacity: 0.3
    });
    const wallMesh = new THREE.Mesh(wallGeo, wallMat);
    wallMesh.position.set(x, y, z);
    this.add(wallMesh);
  }

  onSelectStart(event) {
    if (this.isGrabbing) return;

    const controller = event.target;
    if (!controller) return;

    console.log("🎮 Controller detectado:", controller);

    // Primero intentar agarrar el botón de reset
    if (this.resetButton) {
      const resetIntersections = xb.core.input.intersectObjectByController(controller, this.resetButton);
      if (resetIntersections.length > 0) {
        console.log("✅ Botón reset presionado");
        this.resetBall();
        return;
      }
    }

    // Intentar agarrar la pelota - método 1: xb.core.input
    let intersections = xb.core.input.intersectObjectByController(controller, this.ball);
    
    // Método 2: Si falla, intentar raycast directo
    if (!intersections || intersections.length === 0) {
      const raycaster = new THREE.Raycaster();
      const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(controller.quaternion);
      raycaster.set(controller.position, direction);
      intersections = raycaster.intersectObject(this.ball);
    }
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this.activeController = controller;
      this.ball.material.color.copy(this.colorGrab);
      
      this.lastControllerPos.copy(controller.position);
      
      this.localOffset.copy(this.ball.position)
        .sub(controller.position)
        .applyQuaternion(controller.quaternion.clone().invert());
      
      this.ballBody.mass = 0;
      this.world.addBody(this.ballBody);
      
      console.log("✋ ¡Pelota agarrada!");
    } else {
      console.log("❌ No se detectó contacto con la pelota");
    }
  }

  onSelectEnd(event) {
    if (this.isGrabbing && event.target === this.activeController) {
      this.isGrabbing = false;
      
      // Calcular velocidad basada en el movimiento de la mano
      this.controllerVelocity.copy(this.activeController.position).sub(this.lastControllerPos);
      this.controllerVelocity.multiplyScalar(80); // Velocidad ajustada
      
      // Aplicar velocidad a la pelota
      this.ballBody.mass = 0.2;
      this.ballBody.velocity.set(this.controllerVelocity.x, this.controllerVelocity.y, this.controllerVelocity.z);
      this.ballBody.angularVelocity.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10
      );
      
      this.ball.material.color.copy(this.colorNormal);
      this.activeController = null;
      
      console.log("🚀 ¡PELOTA LANZADA!");
    }
  }

  update() {
    // ==================== ACTUALIZAR FÍSICA ====================
    this.world.step(1 / 90);

    if (this.isGrabbing && this.activeController) {
      // Calcular velocidad del controlador para después
      this.controllerVelocity.copy(this.activeController.position).sub(this.lastControllerPos);
      this.lastControllerPos.copy(this.activeController.position);
      
      // Mover la pelota con la mano (agarre)
      const targetPos = this.activeController.position.clone()
        .add(this.localOffset.clone().applyQuaternion(this.activeController.quaternion));
      
      this.ball.position.lerp(targetPos, 0.5);
      this.ballBody.position.copy(this.ball.position);
      this.ballBody.velocity.set(0, 0, 0);
      this.ballBody.angularVelocity.set(0, 0, 0);
      
    } else {
      // Sincronizar la posición y rotación del mesh con el cuerpo de física
      this.ball.position.copy(this.ballBody.position);
      this.ball.quaternion.set(this.ballBody.quaternion.x, this.ballBody.quaternion.y, 
                               this.ballBody.quaternion.z, this.ballBody.quaternion.w);
    }

    // ==================== AUTO-RESET SI ESTÁ MUY LEJOS ====================
    const distanceFromOrigin = this.ball.position.distanceTo(this.initialBallPos);
    if (distanceFromOrigin > 8) {
      console.log("⚠️ Pelota muy lejos, reseteando...");
      this.resetBall();
    }

    // ==================== SEGURIDAD ====================
    if (this.isGrabbing && this.activeController && !this.activeController.visible) {
      this.isGrabbing = false;
      this.ballBody.mass = 0.2;
      this.ball.material.color.copy(this.colorNormal);
      this.activeController = null;
    }
  }

  createResetPanel() {
    // Panel UI flotante con botón de reset
    const panelGeo = new THREE.PlaneGeometry(0.6, 0.25);
    const panelMat = new THREE.MeshStandardMaterial({ 
      color: 0x1a1a1a,
      metalness: 0.6,
      roughness: 0.2,
      emissive: 0x333333
    });
    const panelMesh = new THREE.Mesh(panelGeo, panelMat);
    panelMesh.position.set(0, 1.4, -1.2);
    this.add(panelMesh);
    
    // Crear textura con texto
    const canvas = document.createElement('canvas');
    canvas.width = 600;
    canvas.height = 250;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(0, 0, 600, 250);
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('RESET', 300, 125);
    
    const texture = new THREE.CanvasTexture(canvas);
    const buttonMat = new THREE.MeshBasicMaterial({ map: texture });
    this.resetButton = new THREE.Mesh(panelGeo, buttonMat);
    this.resetButton.position.copy(panelMesh.position);
    this.resetButton.position.z -= 0.002;
    this.add(this.resetButton);
  }

  resetBall() {
    this.ball.position.copy(this.initialBallPos);
    this.ballBody.position.copy(this.initialBallPos);
    this.ballBody.velocity.set(0, 0, 0);
    this.ballBody.angularVelocity.set(0, 0, 0);
    this.ball.material.color.copy(this.colorNormal);
    console.log("🔄 ¡PELOTA RESETEADA!");
  }
}

// ==================== INICIO ====================
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  options.enableHands();
  options.enableReticles();
  
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('🎾 Pelota con Física');

  try {
    await xb.init(options);
    xb.add(new BallPhysicsExperience());
  } catch (err) {
    console.error("Error al iniciar:", err);
  }
});
    </script>
  </body>
</html>
