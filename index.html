<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Versión mejorada con pelota más grande y agarre dinámico relativo.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    this.ball = null;
    this.activeController = null;
    this.isGrabbing = false;
    
    // Colores pre-definidos
    this.colorNormal = new THREE.Color(0x00ffcc);
    this.colorGrab = new THREE.Color(0xffff00);
    
    // Almacenamos la posición y rotación relativa al momento de agarrar
    this.localOffset = new THREE.Vector3();
  }

  init() {
    // Añadimos luces para dar volumen a la pelota más grande
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(1, 2, 1);
    this.add(dirLight);

    // Pelota más grande (radio 0.12 en lugar de 0.04) y con material reactivo a la luz
    const geometry = new THREE.SphereGeometry(0.12, 32, 32);
    const material = new THREE.MeshPhongMaterial({
      color: this.colorNormal,
      transparent: true,
      opacity: 0.9,
      shininess: 60 // Añade un brillo para mejorar la percepción 3D
    });

    this.ball = new THREE.Mesh(geometry, material);
    this.ball.position.set(0, 1.3, -0.6); // Un poco más alejada para compensar el tamaño
    this.add(this.ball);
    
    console.log("Experiencia cargada. Intenta agarrar la pelota.");
  }

  /**
   * Identificamos el controlador y calculamos el "offset" para un agarre realista.
   */
  onSelectStart(event) {
    if (this.isGrabbing) return;

    const controller = event.target;
    if (!controller) return;

    const intersections = xb.core.input.intersectObjectByController(controller, this.ball);
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this.activeController = controller;
      this.ball.material.color.copy(this.colorGrab);
      
      // Magia del agarre: calculamos la diferencia espacial entre la mano y la pelota 
      // en este instante exacto para no "teletransportar" la pelota al centro de la mano.
      this.localOffset.copy(this.ball.position)
        .sub(controller.position)
        .applyQuaternion(controller.quaternion.clone().invert());
    }
  }

  /**
   * Liberamos la pelota.
   */
  onSelectEnd(event) {
    if (this.isGrabbing && event.target === this.activeController) {
      this.isGrabbing = false;
      this.activeController = null;
      this.ball.material.color.copy(this.colorNormal);
    }
  }

  /**
   * Actualizamos la posición suavemente (Lerp) respetando el agarre inicial.
   */
  update() {
    if (this.isGrabbing && this.activeController) {
      // 1. Calculamos a dónde debe ir la pelota basándonos en la posición de la mano + el offset inicial
      const targetPos = this.activeController.position.clone()
        .add(this.localOffset.clone().applyQuaternion(this.activeController.quaternion));
      
      // 2. Interpolación lineal para el movimiento (0.4 lo hace más rápido y responsivo)
      this.ball.position.lerp(targetPos, 0.4);
      
      // 3. Interpolación esférica para la rotación
      this.ball.quaternion.slerp(this.activeController.quaternion, 0.2);
    }

    // Seguridad: si el controlador deja de ser visible (se pierde el tracking), soltamos.
    if (this.isGrabbing && this.activeController && !this.activeController.visible) {
      this.isGrabbing = false;
      this.activeController = null;
      this.ball.material.color.copy(this.colorNormal);
    }
  }
}

// Configuración de entrada e inicio
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  options.enableHands();
  
  // Desactivamos retículas si lo deseas por rendimiento, aunque con la pelota grande ayuda a apuntar.
  options.enableReticles(); 
  
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Pelota Mejorada XR');

  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (err) {
    console.error("Fallo al iniciar:", err);
  }
});
    </script>
  </body>
</html>
