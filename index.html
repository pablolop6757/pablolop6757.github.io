<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Experiencia interactiva optimizada para Meta Quest 3.
 * Soluciona el error de congelamiento de manos mediante una gestión de estado más limpia.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    this.isGrabbing = false;
    this._activeController = null;
    this._offsetMatrix = new THREE.Matrix4();
    this.ball = null;
    this.originalColor = 0x00ffcc;
    this.grabColor = 0xffff00;
  }

  init() {
    // Iluminación optimizada
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3));
    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(1, 1, 1);
    this.add(light);

    // Crear la pelota
    const geometry = new THREE.SphereGeometry(0.04, 32, 32);
    const material = new THREE.MeshPhongMaterial({
      color: this.originalColor,
      shininess: 60,
      transparent: true,
      opacity: 0.9
    });

    this.ball = new THREE.Mesh(geometry, material);
    // Posición inicial cómoda para interactuar
    this.ball.position.set(0, 1.3, -0.5);
    this.add(this.ball);
    
    console.log("Sistema listo. Prueba a agarrar la pelota.");
  }

  /**
   * Manejador estándar de inicio de selección.
   */
  onSelectStart(event) {
    if (this.isGrabbing) return;

    const controller = event.target;
    // Usamos el sistema de intersección de XR Blocks para verificar contacto
    const intersections = xb.core.input.intersectObjectByController(controller, this.ball);
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this._activeController = controller;
      this.ball.material.color.setHex(this.grabColor);

      // Guardamos la transformación relativa entre el controlador y la pelota
      // Esto evita que la pelota "salte" al centro de la mano de forma brusca
      this.ball.updateMatrixWorld(true);
      controller.updateMatrixWorld(true);

      const mInverse = new THREE.Matrix4().copy(controller.matrixWorld).invert();
      this._offsetMatrix.copy(mInverse).multiply(this.ball.matrixWorld);
    }
  }

  /**
   * Manejador estándar durante el movimiento.
   */
  onSelecting(event) {
    if (!this.isGrabbing || event.target !== this._activeController) return;

    const controller = this._activeController;
    
    // Aplicamos la posición de forma segura descomponiendo la matriz
    // No usamos updateMatrixWorld aquí para evitar bucles infinitos en el render
    const newWorldMatrix = new THREE.Matrix4().multiplyMatrices(controller.matrixWorld, this._offsetMatrix);
    
    const pos = new THREE.Vector3();
    const quat = new THREE.Quaternion();
    const scale = new THREE.Vector3();
    
    newWorldMatrix.decompose(pos, quat, scale);

    this.ball.position.copy(pos);
    this.ball.quaternion.copy(quat);
  }

  /**
   * Manejador estándar de fin de selección.
   */
  onSelectEnd(event) {
    if (this.isGrabbing && event.target === this._activeController) {
      this.isGrabbing = false;
      this._activeController = null;
      this.ball.material.color.setHex(this.originalColor);
    }
  }
}

// Inicialización de la aplicación
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  // Configuración esencial para seguimiento de manos en Quest 3
  options.enableHands();
  options.enableReticles();
  
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Pelota Interactiva Estable');

  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (err) {
    console.error("Error al iniciar la experiencia:", err);
  }
});
    </script>
  </body>
</html>
