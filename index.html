<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Básica XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Experiencia básica: Solo agarrar y mover. Sin físicas.
 */
class BasicBallExperience extends xb.Script {
  constructor() {
    super();
    // Variables para gestionar el estado de agarre
    this.isGrabbing = false;
    this.activeController = null;
    
    // Matriz para guardar la relación inicial entre la mano y la pelota
    this.offsetMatrix = new THREE.Matrix4();
    
    // Variables pre-asignadas para evitar garbage collection en el bucle
    this._pos = new THREE.Vector3();
    this._quat = new THREE.Quaternion();
    this._scale = new THREE.Vector3();
    this._tempMatrix = new THREE.Matrix4();

    // Colores
    this.colorNormal = 0x00ffcc; // Turquesa
    this.colorGrab = 0xffff00;   // Amarillo
  }

  init() {
    // 1. Iluminación
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(1, 2, 1);
    this.add(light);

    // 2. Crear la pelota
    const geometry = new THREE.SphereGeometry(0.05, 32, 32);
    const material = new THREE.MeshPhongMaterial({
      color: this.colorNormal,
      shininess: 60
    });

    this.ball = new THREE.Mesh(geometry, material);
    
    // Posición inicial: frente al usuario
    this.ball.position.set(0, 1.3, -0.5);
    this.add(this.ball);
  }

  /**
   * Se ejecuta cuando el usuario hace el gesto de pinza o pulsa el gatillo.
   */
  onSelectStart(event) {
    if (this.isGrabbing) return;

    const controller = event.target;
    
    // Comprobar si estamos tocando la pelota
    const intersections = xb.core.input.intersectObjectByController(controller, this.ball);
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this.activeController = controller;
      this.ball.material.color.setHex(this.colorGrab);

      // Calcular la posición relativa inicial
      this.ball.updateMatrixWorld(true);
      controller.updateMatrixWorld(true);
      
      const invControllerMatrix = this._tempMatrix.copy(controller.matrixWorld).invert();
      this.offsetMatrix.multiplyMatrices(invControllerMatrix, this.ball.matrixWorld);
    }
  }

  /**
   * Se ejecuta mientras se mantiene el agarre.
   */
  onSelecting(event) {
    if (!this.isGrabbing || event.target !== this.activeController) return;

    const controller = this.activeController;
    
    // Mover la pelota manteniendo la posición relativa
    const newWorldMatrix = this._tempMatrix.multiplyMatrices(controller.matrixWorld, this.offsetMatrix);
    newWorldMatrix.decompose(this._pos, this._quat, this._scale);

    this.ball.position.copy(this._pos);
    this.ball.quaternion.copy(this._quat);
  }

  /**
   * Se ejecuta al soltar la pelota.
   */
  onSelectEnd(event) {
    if (this.isGrabbing && event.target === this.activeController) {
      this.isGrabbing = false;
      this.activeController = null;
      this.ball.material.color.setHex(this.colorNormal);
    }
  }
}

// Configuración de inicio
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  // Activar manos y retículas
  options.enableHands();
  options.enableReticles();
  
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Pelota Básica');

  // xrButton configurado por defecto permite entrar y salir de XR
  // options.xrButton.startText = 'ENTRAR';
  // options.xrButton.endText = 'SALIR';

  try {
    // Al usar xb.init(), XR Blocks se encarga de crear el botón estándar 
    // en la parte inferior de la pantalla para entrar y salir.
    await xb.init(options);
    xb.add(new BasicBallExperience());
  } catch (err) {
    console.error("Fallo al iniciar:", err);
  }
});
    </script>
  </body>
</html>
