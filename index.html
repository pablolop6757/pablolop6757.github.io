    <title>Pelota Interactiva XR | XR Blocks</title>

      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Versión Ultra-Estable para Meta Quest 3.
 * Utiliza el sistema de jerarquía (parenting) de Three.js para evitar crashes por cálculo de matrices.
 */
class BallExperience extends xb.Script {
  constructor() {
    super();
    this.ball = null;
    this.activeController = null;
    this.isGrabbing = false;
    
    // Colores pre-definidos
    this.colorNormal = new THREE.Color(0x00ffcc);
    this.colorGrab = new THREE.Color(0xffff00);
    
    // Variables temporales pre-asignadas (Cero recolección de basura)
    this._worldPos = new THREE.Vector3();
    this._worldQuat = new THREE.Quaternion();
  }

  init() {
    // Iluminación básica y ligera
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(1, 2, 1);
    this.add(sun);

    // Crear la pelota con pocos polígonos para máxima fluidez
    const geometry = new THREE.SphereGeometry(0.04, 16, 16);
    const material = new THREE.MeshPhongMaterial({
      color: this.colorNormal,
      shininess: 50
    });

    this.ball = new THREE.Mesh(geometry, material);
    this.ball.position.set(0, 1.3, -0.5);
    this.add(this.ball);
    
    console.log("App iniciada. Interactúa con la pelota.");
  }

  /**
   * Solo detectamos el inicio del agarre.
   */
  onSelectStart(event) {
    if (this.isGrabbing) return;

    const controller = event.target;
    if (!controller) return;

    // Realizar el test de intersección solo al hacer click/pinch
    const intersections = xb.core.input.intersectObjectByController(controller, this.ball);
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this.activeController = controller;
      
      // Cambio de color visual
      this.ball.material.color.copy(this.colorGrab);

      // --- TRUCO DE ESTABILIDAD: Parenting ---
      // En lugar de calcular matrices cada frame, hacemos que la pelota sea 
      // "hija" del controlador. Three.js se encarga de todo de forma nativa.
      this.ball.getWorldPosition(this._worldPos);
      this.ball.getWorldQuaternion(this._worldQuat);
      
      this.activeController.add(this.ball);
      
      // Ajustar posición local respecto al controlador
      this.ball.position.set(0, 0, -0.05); 
      this.ball.quaternion.set(0, 0, 0, 1);
    }
  }

  /**
   * Finalizamos el agarre y devolvemos la pelota a la escena global.
   */
  onSelectEnd(event) {
    if (this.isGrabbing && event.target === this.activeController) {
      this.releaseBall();
    }
  }

  releaseBall() {
    if (!this.ball || !this.activeController) return;

    // Obtener posición final en el mundo antes de desvincular
    this.ball.getWorldPosition(this._worldPos);
    this.ball.getWorldQuaternion(this._worldQuat);

    // Devolver la pelota a la escena principal (fuera del controlador)
    this.add(this.ball);
    
    // Aplicar la posición final
    this.ball.position.copy(this._worldPos);
    this.ball.quaternion.copy(this._worldQuat);

    this.ball.material.color.copy(this.colorNormal);
    this.isGrabbing = false;
    this.activeController = null;
  }

  /**
   * Vigilancia constante para evitar cuelgues si se pierde el seguimiento.
   */
  update() {
    // Si estamos agarrando pero el controlador desaparece o pierde seguimiento, liberamos.
    if (this.isGrabbing && this.activeController) {
        if (!this.activeController.visible) {
            this.releaseBall();
        }
    }
  }
}

// Configuración de entrada
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  options.enableHands();
  options.enableReticles();
  
  // Optamos por una visualización de manos más sencilla si persiste el crash
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('Safe Ball Experience');

  try {
    await xb.init(options);
    xb.add(new BallExperience());
  } catch (err) {
    console.error("Error al cargar XR:", err);
  }
});
    </script>
  </body>
