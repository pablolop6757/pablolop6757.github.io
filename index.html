<!doctype html>
<html lang="es">
  <head>
    <title>Mantenimiento Panel Eléctrico | XR Blocks</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.10.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';

/**
 * Aplicación de mantenimiento guiado para un panel eléctrico.
 * El progreso es totalmente automático al interactuar físicamente con los marcadores azules.
 */
class MaintenanceApp extends xb.Script {
  
  constructor() {
    super();
    this.currentStepIndex = 0;
    this.marker = null;
    this.panelModel = null;
    this.isWaitingForInteraction = false;
    
    // Configuración de los pasos del tutorial basados en el esquema
    // IMPORTANTE: Ajusta las coordenadas 'markerPos' (x, y, z) probándolo en visor
    // para que el cubo azul encaje en cada componente físico.
    // El eje X es izquierda/derecha, el eje Y es arriba/abajo, el eje Z es adelante/atrás.
    // El panel base está en x=0, z=-1.0 aprox.
    this.steps = [
      {
        title: "Inicio",
        text: "Mantenimiento del panel TSK.\n\nSigue las luces azules en el modelo.\nPulsa el botón abajo para iniciar.",
        markerPos: null
      },
      {
        title: "Paso 1: Seccionador Principal",
        text: "Localiza el seccionador principal (F1).\nAcciónalo para cortar la corriente general.\n\nToca el cubo azul para confirmar.",
        markerPos: new THREE.Vector3(-0.2, 1.4, -0.9) // Ajustar para F1
      },
      {
        title: "Paso 2: Disyuntor Q1",
        text: "Verifica el estado mecánico del disyuntor Q1.\nBájalo y súbelo.\n\nToca el cubo azul al terminar.",
        markerPos: new THREE.Vector3(0.0, 1.4, -0.9) // Ajustar para Q1
      },
      {
        title: "Paso 3: Disyuntor Q2",
        text: "Verifica el estado mecánico del disyuntor Q2.\nBájalo y súbelo.\n\nToca el cubo azul al terminar.",
        markerPos: new THREE.Vector3(0.1, 1.4, -0.9) // Ajustar para Q2
      },
      {
        title: "Paso 4: Disyuntor Q3",
        text: "Verifica el estado mecánico del disyuntor Q3.\nBájalo y súbelo.\n\nToca el cubo azul al terminar.",
        markerPos: new THREE.Vector3(0.2, 1.4, -0.9) // Ajustar para Q3
      },
      {
        title: "Paso 5: Selector Manual/Auto",
        text: "Revisa el selector de modo (M).\nAsegúrate de que gira correctamente.\n\nToca el cubo azul para confirmar.",
        markerPos: new THREE.Vector3(-0.1, 1.2, -0.9) // Ajustar para el selector (M)
      },
      {
        title: "Paso 6: Pulsador Negro",
        text: "Comprueba el retorno del pulsador negro (B).\n\nToca el cubo azul sobre el pulsador.",
        markerPos: new THREE.Vector3(0.0, 1.2, -0.9) // Ajustar para el pulsador negro (B)
      },
      {
        title: "Paso 7: Piloto Rojo",
        text: "Revisa visualmente el piloto rojo (R).\n\nToca el cubo azul para confirmar.",
        markerPos: new THREE.Vector3(0.1, 1.2, -0.9) // Ajustar para el piloto rojo (R)
      },
      {
        title: "Paso 8: Piloto Amarillo",
        text: "Revisa visualmente el piloto amarillo (Y).\n\nToca el cubo azul para confirmar.",
        markerPos: new THREE.Vector3(0.2, 1.2, -0.9) // Ajustar para el piloto amarillo (Y)
      },
      {
        title: "Paso 9: Piloto Verde",
        text: "Revisa visualmente el piloto verde (G).\n\nToca el cubo azul para confirmar.",
        markerPos: new THREE.Vector3(0.3, 1.2, -0.9) // Ajustar para el piloto verde (G)
      },
      {
        title: "Paso 10: Restaurar Energía",
        text: "Vuelve a activar el seccionador principal (F1) para reenergizar.\n\nToca el cubo azul.",
        markerPos: new THREE.Vector3(-0.2, 1.4, -0.9) // Volver a la posición de F1
      },
      {
        title: "¡Completado!",
        text: "Mantenimiento preventivo finalizado con éxito.\n\nPuedes reiniciar el proceso.",
        markerPos: null
      }
    ];
  }

  async init() {
    // 1. Añadir iluminación
    this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 2.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(2, 5, 3);
    this.add(dirLight);

    // 2. Crear panel UI mejorado
    this.createInstructionPanel();

    // 3. Cargar el modelo 3D (más pequeño)
    await this.loadElectricalPanel();

    // 4. Crear el marcador 3D (Cubo azul)
    this.createInteractionMarker();

    // Iniciar
    this.updateStepUI();
  }

  createInstructionPanel() {
    this.uiPanel = new xb.SpatialPanel({
      width: 0.9,
      height: 0.7,
      backgroundColor: '#1a1a24ee', // Color oscuro azulado
      showEdge: true,               // Borde visible
      edgeColor: '#3a3a4a'
    });
    // Hacemos el panel NO arrastrable para que no desaparezca al tocarlo por error
    this.uiPanel.draggable = false; 

    // Posición a la izquierda, a la altura de los ojos, inclinado hacia el usuario
    this.uiPanel.position.set(-0.6, xb.core.user.height, -0.9);
    this.uiPanel.rotation.set(0, Math.PI / 6, 0); 
    this.add(this.uiPanel);

    const grid = this.uiPanel.addGrid();
    
    // Título
    this.titleText = grid.addRow({weight: 0.25}).addText({
      text: 'Cargando...',
      fontColor: '#00ccff', // Azul neón
      fontSize: 0.07
    });
    
    // Separador
    grid.addRow({weight: 0.05}).addPanel({
        backgroundColor: '#3a3a4a',
        width: 0.8,
        height: 0.01
    });

    // Descripción
    this.descText = grid.addRow({weight: 0.5}).addText({
      text: 'Por favor espera...',
      fontColor: '#ffffff',
      fontSize: 0.05,
      textAlign: 'center'
    });

    // Botón / Indicador
    const btnRow = grid.addRow({weight: 0.2});
    btnRow.addCol({weight: 0.15});
    this.actionBtn = btnRow.addCol({weight: 0.7}).addTextButton({
      text: 'Empezar',
      backgroundColor: '#0066ff',
      fontSize: 0.05
    });
    btnRow.addCol({weight: 0.15});

    // Lógica del botón (solo para Iniciar/Reiniciar)
    this.actionBtn.onTriggered = () => {
      if (!this.isWaitingForInteraction) {
        this.nextStep();
      }
    };
  }

  async loadElectricalPanel() {
    try {
      const loader = new xb.ModelLoader();
      const gltf = await loader.load({
        url: 'TSK_Box2.glb',
        renderer: xb.core.renderer
      });
      
      this.panelModel = gltf.scene;
      
      // Rotar 90 grados para ponerlo de pie
      this.panelModel.rotation.x = Math.PI / 2;
      this.panelModel.updateMatrixWorld(true);
      
      const box = new THREE.Box3().setFromObject(this.panelModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // --- PANEL MÁS PEQUEÑO ---
      // Reducimos el tamaño objetivo de 1.2m a 0.9m
      const maxDim = Math.max(size.x, size.y, size.z);
      const targetSize = 0.9; 
      const scale = maxDim > 0 ? targetSize / maxDim : 1;
      
      this.panelModel.scale.set(scale, scale, scale);

      // Centramos el modelo frente a la cámara (un poco más cerca: z = -1.0)
      this.panelModel.position.set(
        -center.x * scale,
        (-center.y * scale) + xb.core.user.height - 0.2, 
        (-center.z * scale) - 1.0
      );
      
      this.add(this.panelModel);
    } catch (error) {
      console.error("Error al cargar el modelo:", error);
      this.titleText.setText("Error");
      this.descText.setText("No se pudo cargar el modelo.");
    }
  }

  createInteractionMarker() {
    // --- CUBO AZUL ---
    // Usamos BoxGeometry en lugar de SphereGeometry
    const geometry = new THREE.BoxGeometry(0.06, 0.06, 0.06);
    
    // Material con azul neón, semi-transparente, con bordes visibles (wireframe)
    const material = new THREE.MeshBasicMaterial({
      color: 0x0066ff,
      transparent: true,
      opacity: 0.6,
      wireframe: false // Quitamos el wireframe para que parezca más un botón sólido
    });
    
    this.marker = new THREE.Mesh(geometry, material);
    
    // Añadir un borde brillante al cubo para que destaque más
    const edges = new THREE.EdgesGeometry(geometry);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
    this.marker.add(line);

    this.marker.visible = false;
    this.add(this.marker);
  }

  updateStepUI() {
    const step = this.steps[this.currentStepIndex];
    
    this.titleText.setText(step.title);
    this.descText.setText(step.text);

    if (step.markerPos) {
      // PASO INTERACTIVO CON EL MODELO 3D
      this.isWaitingForInteraction = true;
      this.marker.position.copy(step.markerPos);
      this.marker.visible = true;
      
      // Botón inactivo como indicador visual
      this.actionBtn.setText('👉 Toca el cubo azul');
      this.actionBtn.options.backgroundColor = '#333333'; 
      this.actionBtn.options.fontColor = '#888888'; 
    } else {
      // PASO DE MENÚ
      this.isWaitingForInteraction = false;
      this.marker.visible = false;
      
      this.actionBtn.setText(this.currentStepIndex === 0 ? 'Empezar' : 'Reiniciar');
      this.actionBtn.options.backgroundColor = '#0066ff';
      this.actionBtn.options.fontColor = '#ffffff'; 
    }
    
    this.uiPanel.updateLayouts();
  }

  nextStep() {
    this.currentStepIndex++;
    if (this.currentStepIndex >= this.steps.length) {
      this.currentStepIndex = 0;
    }
    this.updateStepUI();
  }

  /**
   * Interacción automática al tocar el cubo azul.
   */
  onSelectStart(event) {
    if (!this.isWaitingForInteraction || !this.marker.visible) return;

    const controller = event.target;
    const intersection = xb.core.user.select(this.marker, controller);
    
    if (intersection) {
      // Feedback visual: el cubo se vuelve blanco brillante brevemente
      this.marker.material.color.setHex(0xffffff);
      
      setTimeout(() => {
        this.marker.material.color.setHex(0x0066ff); // Vuelve a azul
        this.nextStep();
      }, 250);
    }
  }

  update() {
    super.update();
    
    // Animación de rotación y pulso para el cubo azul
    if (this.marker && this.marker.visible) {
      // Rotación suave
      this.marker.rotation.y += 0.01;
      this.marker.rotation.x += 0.01;
      
      // Pulso de tamaño
      const scale = 1.0 + Math.sin(performance.now() * 0.005) * 0.15;
      this.marker.scale.setScalar(scale);
    }
  }
}

document.addEventListener('DOMContentLoaded', function () {
  const options = new xb.Options();
  options.enableUI();
  options.enableHands(); 
  options.reticles.enabled = true;
  options.setAppTitle('TSK Mantenimiento');

  xb.add(new MaintenanceApp());
  xb.init(options);
});
    </script>
  </body>
</html>
