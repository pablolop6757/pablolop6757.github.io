<!doctype html>
<html lang="es">
  <head>
    <title>Pelota Interactiva XR | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "cannon": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';
import * as CANNON from 'cannon';

/**
 * Pelota con física completa - rebota, rueda y se lanza.
 */
class BallPhysicsExperience extends xb.Script {
  constructor() {
    super();
    this.ball = null;
    this.ballBody = null;
    this.activeController = null;
    this.isGrabbing = false;
    this.lastControllerPos = new THREE.Vector3();
    this.controllerVelocity = new THREE.Vector3();
    
    // Colores
    this.colorNormal = new THREE.Color(0x00ffcc);
    this.colorGrab = new THREE.Color(0xffff00);
    
    // Offset relativo
    this.localOffset = new THREE.Vector3();
    
    // Física
    this.world = null;
    this.ballRadius = 0.12;
  }

  init() {
    // ==================== FÍSICAS ====================
    this.setupPhysics();
    
    // ==================== LUCES ====================
    this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(1, 2, 1);
    this.add(dirLight);

    // ==================== PELOTA ====================
    const geometry = new THREE.SphereGeometry(this.ballRadius, 32, 32);
    const material = new THREE.MeshPhongMaterial({
      color: this.colorNormal,
      transparent: true,
      opacity: 0.9,
      shininess: 60
    });

    this.ball = new THREE.Mesh(geometry, material);
    this.ball.position.set(0, 1.3, -0.6);
    this.add(this.ball);

    // Crear cuerpo físico para la pelota
    const ballShape = new CANNON.Sphere(this.ballRadius);
    this.ballBody = new CANNON.Body({
      mass: 0.5, // Ligera
      shape: ballShape,
      linearDamping: 0.3,
      angularDamping: 0.3,
      restitution: 0.8 // Rebote (0-1, 1 es máximo rebote)
    });
    this.ballBody.position.set(this.ball.position.x, this.ball.position.y, this.ball.position.z);
    this.world.addBody(this.ballBody);
    
    console.log("🎮 Pelota con física cargada. ¡Intenta agarrar, lanzar y ver cómo rebota!");
  }

  setupPhysics() {
    // Crear mundo de física
    this.world = new CANNON.World();
    this.world.gravity.set(0, -9.82, 0); // Gravedad
    this.world.defaultContactMaterial.friction = 0.4;
    this.world.defaultContactMaterial.restitution = 0.3;

    // ==================== SUELO ====================
    const groundShape = new CANNON.Plane();
    const groundBody = new CANNON.Body({
      mass: 0,
      shape: groundShape,
      restitution: 0.5
    });
    groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
    groundBody.position.y = 0; // Piso en y=0
    this.world.addBody(groundBody);

    // Visualizar el suelo (opcional, pero útil para debugging)
    const groundGeo = new THREE.PlaneGeometry(5, 5);
    const groundMat = new THREE.MeshStandardMaterial({ 
      color: 0x444444, 
      metalness: 0.3,
      roughness: 0.7
    });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.y = 0;
    groundMesh.receiveShadow = true;
    this.add(groundMesh);

    // ==================== PAREDES (opcional, para contener la pelota) ====================
    this.createWall(-2.5, 1, 0, 0.1, 2, 5); // Pared izquierda
    this.createWall(2.5, 1, 0, 0.1, 2, 5);  // Pared derecha
    this.createWall(0, 1, -2.5, 5, 2, 0.1); // Pared trasera
  }

  createWall(x, y, z, width, height, depth) {
    // Cuerpo físico
    const wallShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
    const wallBody = new CANNON.Body({ mass: 0, shape: wallShape });
    wallBody.position.set(x, y, z);
    this.world.addBody(wallBody);

    // Visualización (opcional)
    const wallGeo = new THREE.BoxGeometry(width, height, depth);
    const wallMat = new THREE.MeshStandardMaterial({ 
      color: 0x666666, 
      metalness: 0.2,
      roughness: 0.8,
      transparent: true,
      opacity: 0.3
    });
    const wallMesh = new THREE.Mesh(wallGeo, wallMat);
    wallMesh.position.set(x, y, z);
    this.add(wallMesh);
  }

  onSelectStart(event) {
    if (this.isGrabbing) return;

    const controller = event.target;
    if (!controller) return;

    const intersections = xb.core.input.intersectObjectByController(controller, this.ball);
    
    if (intersections.length > 0) {
      this.isGrabbing = true;
      this.activeController = controller;
      this.ball.material.color.copy(this.colorGrab);
      
      // Guardar posición para calcular velocidad después
      this.lastControllerPos.copy(controller.position);
      
      // Calcular offset relativo
      this.localOffset.copy(this.ball.position)
        .sub(controller.position)
        .applyQuaternion(controller.quaternion.clone().invert());
      
      // Poner la pelota en "cinemática" mientras la agarramos (congelamos física)
      this.ballBody.mass = 0;
      this.world.addBody(this.ballBody);
      
      console.log("✋ ¡Pelota agarrada!");
    }
  }

  onSelectEnd(event) {
    if (this.isGrabbing && event.target === this.activeController) {
      this.isGrabbing = false;
      
      // Calcular velocidad basada en el movimiento de la mano
      this.controllerVelocity.copy(this.activeController.position).sub(this.lastControllerPos);
      this.controllerVelocity.multiplyScalar(50); // Amplificar un poco la velocidad
      
      // Aplicar velocidad a la pelota
      this.ballBody.mass = 0.5;
      this.ballBody.velocity.set(this.controllerVelocity.x, this.controllerVelocity.y, this.controllerVelocity.z);
      
      this.ball.material.color.copy(this.colorNormal);
      this.activeController = null;
      
      console.log("🚀 ¡Pelota lanzada con velocidad!", this.controllerVelocity);
    }
  }

  update() {
    // ==================== ACTUALIZAR FÍSICA ====================
    this.world.step(1 / 60); // 60 FPS

    if (this.isGrabbing && this.activeController) {
      // Calcular velocidad del controlador para después
      this.controllerVelocity.copy(this.activeController.position).sub(this.lastControllerPos);
      this.lastControllerPos.copy(this.activeController.position);
      
      // Mover la pelota con la mano (agarre)
      const targetPos = this.activeController.position.clone()
        .add(this.localOffset.clone().applyQuaternion(this.activeController.quaternion));
      
      this.ball.position.lerp(targetPos, 0.4);
      
      // Actualizar posición del cuerpo físico también
      this.ballBody.position.set(this.ball.position.x, this.ball.position.y, this.ball.position.z);
      
    } else {
      // Sincronizar la posición y rotación del mesh con el cuerpo de física
      this.ball.position.set(this.ballBody.position.x, this.ballBody.position.y, this.ballBody.position.z);
      this.ball.quaternion.set(this.ballBody.quaternion.x, this.ballBody.quaternion.y, 
                               this.ballBody.quaternion.z, this.ballBody.quaternion.w);
    }

    // Seguridad
    if (this.isGrabbing && this.activeController && !this.activeController.visible) {
      this.isGrabbing = false;
      this.ballBody.mass = 0.5;
      this.ball.material.color.copy(this.colorNormal);
      this.activeController = null;
    }
  }
}

// ==================== INICIO ====================
document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  
  options.enableHands();
  options.enableReticles();
  
  options.hands.visualization = true;
  options.hands.visualizeMeshes = true;
  
  options.setAppTitle('🎾 Pelota con Física');

  try {
    await xb.init(options);
    xb.add(new BallPhysicsExperience());
  } catch (err) {
    console.error("Error al iniciar:", err);
  }
});
    </script>
  </body>
</html>
